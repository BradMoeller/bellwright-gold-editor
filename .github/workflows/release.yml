name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dist="bellwright-gold-editor-${{ matrix.name }}"
          mkdir "$dist"
          bindir="target/${{ matrix.target }}/release"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$bindir/bellwright-gold-editor.exe" "$bindir/bellwright-gold-cli.exe" "$dist/"
          else
            cp "$bindir/bellwright-gold-editor" "$bindir/bellwright-gold-cli" "$dist/"
          fi
          cp README.md LICENSE CHANGELOG.md "$dist/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "$dist.zip" "$dist"
            echo "ASSET=$dist.zip" >> "$GITHUB_ENV"
          else
            tar czf "$dist.tar.gz" "$dist"
            echo "ASSET=$dist.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          draft: true
          generate_release_notes: true
